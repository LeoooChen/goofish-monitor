services:
  ai-goofish-monitor:
    build:
      context: .
    image: ai-goofish-monitor:latest
    container_name: ai-goofish-monitor
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8000
      GOOFISH_ADMIN_PASSWORD: ${GOOFISH_ADMIN_PASSWORD:-}
      GOOFISH_ADMIN_PASSWORD_HASH: ${GOOFISH_ADMIN_PASSWORD_HASH:-}
      GOOFISH_SESSION_SECRET: ${GOOFISH_SESSION_SECRET:-}
      GOOFISH_BROWSER_HEADLESS: ${GOOFISH_BROWSER_HEADLESS:-true}
    restart: unless-stopped
